<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* --- CONFIGURATION: CHANGE THESE VALUES --- */
        :root {
            --primary-bg: #0a0a0a;
            --secondary-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ffffff; /* Change this for a brand color */
            --font-main: 'Inter', sans-serif;
        }

        /* --- BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        section {
            padding: 80px 10%;
        }

        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1493863641943-9b689da23bca?q=80&w=2058&auto=format&fit=crop') center/cover;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        /* --- ABOUT SECTION --- */
        .about {
            background-color: var(--secondary-bg);
            text-align: center;
        }

        .about p {
            max-width: 700px;
            margin: 20px auto;
            color: var(--text-dim);
        }

        /* --- GALLERY SECTION --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 40px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #222;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            filter: grayscale(100%);
        }

        .gallery-item img:hover {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        /* --- CONTACT SECTION --- */
        .contact {
            max-width: 600px;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            color: white;
            font-family: inherit;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            section { padding: 50px 5%; }
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>GOWTHAM</h1> <p>Capturing silence in a loud world.</p> </section>

    <section id="about" class="about">
        <h2>About Me</h2>
        <p>
            Freelance photographer based in the city. Specializing in minimal 
            landscapes, street photography, and visual storytelling. 
            I believe every frame should hold a secret.
        </p>
    </section>

    <section id="gallery">
        <h2 style="text-align: center; margin-bottom: 30px;">Portfolio</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://via.placeholder.com/600x600?text=Work+1" alt="Work 1"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/600x600?text=Work+2" alt="Work 2"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/600x600?text=Work+3" alt="Work 3"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/600x600?text=Work+4" alt="Work 4"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/600x600?text=Work+5" alt="Work 5"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/600x600?text=Work+6" alt="Work 6"></div>
        </div>
    </section>

    <section id="contact" class="contact">
        <h2 style="text-align: center; margin-bottom: 30px;">Get In Touch</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Project Details"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer style="text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.8rem;">
        &copy; 2026 GOWTHAM PHOTOGRAPHY. All Rights Reserved.
    </footer>

</body>
</html>
